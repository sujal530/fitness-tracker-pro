<!DOCTYPE html>
<html>
<head>
    <title>Add Data</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2>Add Fitness Data</h2>

<form method="POST">
    <input type="number" name="steps" placeholder="Steps" required><br><br>
    <input type="number" name="calories" placeholder="Calories" required><br><br>
    <input type="number" step="0.1" name="water" placeholder="Water (L)" required><br><br>
    <button type="submit">Save</button>
</form>

</body>
</html>
